<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Magical Journal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#13131a', 700: '#1c1c24' },
                        neon: { blue: '#4f46e5', purple: '#9333ea', pink: '#ec4899', yellow: '#fbbf24', green: '#22c55e', orange: '#f97316' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="bg-dark-900 text-white font-sans overflow-x-hidden relative journal-bg">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 glass-panel border-r border-white/5 flex flex-col pt-8 pb-4 z-10 hidden md:flex h-full" id="sidebar">
            <div class="px-6 mb-8 flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-neon-blue to-neon-purple flex items-center justify-center shadow-lg shadow-neon-blue/20">
                    <i data-lucide="check-square" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">TaskFlow</h1>
            </div>
            
            <div class="px-4 mb-4">
                <ul class="space-y-1">
                    <li>
                        <a href="/" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all group border border-transparent">
                            <i data-lucide="layout-dashboard" class="w-4 h-4 text-neon-blue group-hover:scale-110 transition-transform"></i>
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="/fitness" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all group border border-transparent">
                            <i data-lucide="activity" class="w-4 h-4 text-neon-pink group-hover:scale-110 transition-transform"></i>
                            Fitness
                        </a>
                    </li>
                    <li>
                        <a href="/journal" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl bg-white/10 text-white font-medium transition-all group backdrop-blur-md shadow-inner border border-white/5">
                            <i data-lucide="book-open" class="w-4 h-4 text-neon-orange"></i>
                            Journal
                        </a>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
            <!-- Top Bar -->
            <header class="h-20 glass-panel border-b border-white/5 flex items-center justify-between px-8 z-30">
                <div class="flex items-center gap-4">
                    <button class="md:hidden text-gray-400 hover:text-white transition-colors" id="btn-menu">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <!-- Greeting -->
                    <div>
                        <h2 class="text-xl font-bold tracking-tight">Magical Journal</h2>
                        <p class="text-xs text-neon-orange font-medium mt-0.5">Chronicle your daily endeavors</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="relative ml-2" id="profile-menu-container">
                        <button id="btn-profile" class="cursor-ring flex items-center gap-2 hover:opacity-80 transition-opacity focus:outline-none">
                            <img id="nav-profile-img" src="{{ url_for('static', filename='uploads/profile_images/default_avatar.png') }}" alt="Profile" class="w-10 h-10 rounded-full object-cover border-2 border-white/10 shadow-[0_0_10px_rgba(255,255,255,0.1)]">
                        </button>
                    </div>
                </div>
            </header>

            <!-- Dashboard Content: The Magic Book -->
            <div class="flex-1 overflow-hidden p-6 md:p-8 flex flex-col relative" id="main-scroll-area">
                
                <!-- Controls top bar -->
                <div class="flex justify-between items-center mb-4 z-20 max-w-4xl mx-auto w-full">
                    <button id="btn-prev-day" class="text-gray-400 hover:text-neon-orange transition-colors flex items-center gap-1 group">
                        <i data-lucide="chevron-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i> Previous Day
                    </button>
                    
                    <div class="text-center">
                        <h3 id="display-date" class="text-lg font-semibold text-white tracking-wider">Today</h3>
                        <p id="save-status" class="text-xs text-gray-500 opacity-0 transition-opacity">Saved</p>
                    </div>

                    <button id="btn-next-day" class="text-gray-400 hover:text-neon-orange transition-colors flex items-center gap-1 group opacity-50 cursor-not-allowed">
                        Next Day <i data-lucide="chevron-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>

                <!-- Book Container -->
                <div class="book-container relative flex-1">
                    <div id="magic-particles" class="magic-particles"></div>
                    
                    <div class="magic-book" id="the-book">
                        
                        <!-- The Cover -->
                        <div class="book-cover flex flex-col items-center justify-center cursor-pointer group" id="book-cover">
                            <div class="cover-title">
                                Daily<br>Chronicles
                            </div>
                            <div class="mt-8 text-xs tracking-[0.2em] uppercase text-yellow-600/50 group-hover:text-yellow-500 transition-colors duration-500">
                                Click to Open
                            </div>
                            
                            <!-- Inside of cover (when opened) -->
                            <div class="book-cover-inner cursor-default"></div>
                        </div>

                        <!-- Left Page (Static background) -->
                        <div class="page-left-side">
                            <div class="w-full flex-1 flex flex-col items-center justify-center opacity-30 select-none">
                                <i data-lucide="feather" class="w-24 h-24 text-amber-900 mb-4 drop-shadow-md"></i>
                                <p class="cursive-text text-amber-900/80 text-xl text-center px-4 leading-relaxed">
                                    "Words are, in my not-so-humble opinion, our most inexhaustible source of magic."
                                </p>
                            </div>
                            <div class="text-xs text-center text-amber-900/40">Page <span id="page-num-left">1</span></div>
                        </div>

                        <!-- Right Page (The Active Page) -->
                        <div class="book-page flex flex-col" id="active-page">
                            <div class="flex justify-between items-end border-b-2 border-amber-900/20 pb-2 mb-4">
                                <h3 class="cursive-text text-2xl font-bold text-amber-950" id="page-date-header">Date</h3>
                                <button id="btn-save-note" class="text-amber-900/60 hover:text-amber-900 transition-colors pointer-events-none" title="Saved">
                                    <i data-lucide="check-circle" class="w-5 h-5" id="save-icon"></i>
                                </button>
                            </div>
                            
                            <textarea id="journal-input" class="cursive-text page-lines flex-1 bg-transparent w-full resize-none outline-none text-amber-950 placeholder-amber-900/40" placeholder="I solemnly swear that I am up to no good... Begin writing your day here..."></textarea>
                            
                            <div class="text-xs text-center text-amber-900/40 mt-4 border-t border-amber-900/10 pt-2">Page <span id="page-num-right">2</span></div>
                        </div>

                        <!-- Flipped Page (For Animation) -->
                        <div class="book-page hidden" id="flip-page">
                            <div class="w-full h-full"></div>
                        </div>

                    </div>
                </div>
                
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/journal.js') }}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#13131a', 700: '#1c1c24' },
                        neon: { blue: '#4f46e5', purple: '#9333ea', pink: '#ec4899', yellow: '#fbbf24' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="bg-dark-900 text-white font-sans min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background Elements -->
    <div class="fixed inset-0 z-[-1] pointer-events-none">
        <div class="absolute top-[-10%] right-[10%] w-[50%] h-[50%] bg-neon-pink/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] left-[10%] w-[40%] h-[40%] bg-neon-blue/20 rounded-full blur-[100px]"></div>
    </div>

    <!-- Signup Card -->
    <div class="glass-card w-full max-w-md p-8 md:p-10 rounded-3xl relative z-10 border border-white/10 shadow-2xl shadow-neon-blue/10">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold mb-2">Create an Account</h1>
            <p class="text-gray-400 text-sm">Join TaskFlow and supercharge your productivity</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-xl mb-6 text-sm flex items-center gap-2">
            <i data-lucide="alert-circle" class="w-4 h-4"></i>
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('signup') }}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5 focus-within:text-neon-blue transition-colors">Full Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                    <input type="text" name="name" required class="w-full bg-dark-800/50 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white focus:outline-none focus:border-neon-blue focus:ring-1 focus:ring-neon-blue transition-all" placeholder="John Doe">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5 focus-within:text-neon-blue transition-colors">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </div>
                    <input type="email" name="email" required class="w-full bg-dark-800/50 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white focus:outline-none focus:border-neon-blue focus:ring-1 focus:ring-neon-blue transition-all" placeholder="you@example.com">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5 focus-within:text-neon-blue transition-colors">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500">
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </div>
                    <input type="password" name="password" required class="w-full bg-dark-800/50 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white focus:outline-none focus:border-neon-blue focus:ring-1 focus:ring-neon-blue transition-all" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full mt-4 flex items-center justify-center gap-2 bg-gradient-to-r from-neon-blue to-neon-purple text-white px-5 py-3 rounded-xl font-medium shadow-[0_0_15px_rgba(79,70,229,0.3)] hover:shadow-[0_0_25px_rgba(79,70,229,0.5)] hover:scale-[1.02] transition-all duration-300 group">
                <span class="relative z-10 w-full flex justify-center items-center gap-2">
                    Create Account <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                </span>
            </button>
        </form>

        <p class="text-center text-gray-400 text-sm mt-8">
            Already have an account? <a href="{{ url_for('login') }}" class="text-neon-blue hover:text-neon-purple font-medium transition-colors">Sign in</a>
        </p>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
